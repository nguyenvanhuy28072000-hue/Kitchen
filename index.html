<!DOCTYPE html>
<html lang="ja">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>キッチンコース管理</title>
        <style>
            body{
                font-family:sans-serif;
                margin:5px;
            }
            h4{ 
                text-align:center;      /*文字が中央にある*/
             } 
        
            .controls{
                margin-bottom:10px;     /*入力項目ごとの下の余白をあける*/
            }


            
            select,button{      /*選択、クリックボタン*/
                padding:6px;   /*[内側」の余白*/
                font-size:16px;  /*文字サイズ*/
                margin-right:3px;  /*要素の境界線の「右の外側」の余白*/
            }

            
            input{      /* 入力ボタン */
                text-align: center;     /*文字が中央にある*/
                width: 73px;
                height: 25px;
                font-size: 16px;
            }

            button{
                cursor:pointer;  /*要素にマウスカーソルを乗せたときに、矢印から「指さしマーク」に変化させる*/
            }
            table{
                width:100%;
                border-collapse:collapse;
                background:rgb(244, 240, 240);
            }
            th,td{      /*th:表の見出し、td:表のデータ（中身）*/
                border:1px solid #ccc;
                padding:1px;
                text-align:center;
            }
            th{     /*表の見出し*/
                background:#333;
                color:white;
            }
            .dish{  /*料理カード全体のスタイル*/
                width: 8%;
                cursor:pointer;
                font-weight:bold;
            }
            .done{      /*料理カードの中にある「完了」バッジだけのスタイル*/
                background:#d9d9d9;
                color:#777;
                text-decoration:line-through;
            }
            button:first-child {
                color: blue;
            }

            button:last-child {
                color: red;
            }
            

            }
        </style>




</head>
<body>


    <!--<h4>キッチンコース管理</h4> --> 
    <div class="controls">

         <select id="courseSelect">
            <option value="">コース選択</option>
            <option value="4000円">4000円コース</option>
            <option value="4500円">4500円コース</option>
            <option value="5000円">5000円コース</option>
            <option value="6000円">6000円コース</option>
            <option value="7000円">7000円コース</option>
        </select>

            <input type="time" id="courseTime">
            <input type="number" id="people" placeholder="人数" style="width: 70px;" min = 1> 
            <input type="number" id="tableNo" placeholder="テーブル" style="width:70px;" min = 1>

            <button onclick="addCourse()">追加</button>

    </div>
        <table>
            <thead>
                <tr>
                    <th></th>
                    <th></th>
                    <th>コース</th>
                    <th>時間</th>
                    <th>人数</th>
                    <th>テーブル</th>
                    <th>料理①</th>
                    <th>料理②</th>
                    <th>料理③</th>
                    <th>料理④</th>
                    <th>料理⑤</th>
                    <th>料理⑥</th>
                    <th>料理⑦</th>
                    <th>料理⑧</th>
                    <th>料理⑨</th>
                </tr>
            </thead>

        <tbody id="courseBody"></tbody>
        </table>

<script type="module" src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
