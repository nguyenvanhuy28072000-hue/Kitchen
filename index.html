<!DOCTYPE html>
<html lang="ja">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black">
        <title>キッチンコース管理</title>
        <style>
            body{
                font-family:sans-serif;
                margin:5px;
            }
            h4{ 
                text-align:center;      /*文字が中央にある*/
             } 
        
            .controls{
                margin-bottom:3px;     /*入力項目ごとの下の余白をあける*/
            }
 
            select,button{      /*選択、クリックボタン*/
                padding:6px;   /*[内側」の余白*/
                font-size:16px;  /*文字サイズ*/
                margin-right:3px;  /*要素の境界線の「右の外側」の余白*/
            }

            
            input{      /* 入力ボタン */
                text-align: center;     /*文字が中央にある*/
                width: 73px;
                height: 25px;
                font-size: 16px;
            }

            button{
                cursor:pointer;  /*要素にマウスカーソルを乗せたときに、矢印から「指さしマーク」に変化させる*/
            }
            table{
                width:100%;
                border-collapse:collapse;
                background:rgb(244, 240, 240);
            }
            th,td{      /*th:表の見出し、td:表のデータ（中身）*/
                border:1px solid #ccc;
                padding:1px;
                text-align:center;
            }
            th{     /*表の見出し*/
                background:#333;
                color:white;
            }
            .dish{  /*料理カード全体のスタイル*/
                width: 8%;
                cursor:pointer;
                font-weight:bold;
            }
            .done{      /*料理カードの中にある「完了」バッジだけのスタイル*/
                background:#2f4f4f;
                color:#777;
                text-decoration:line-through;
            }
            button:first-child {
                color: blue;
                    padding:5px;
            }

            button:last-child {
                color: red;
                    padding:5px;
            }

                /*料理カードの色設定*/
                .dish0 {
                    background-color: #ffd6d6;
                }

                .dish1 {
                    background-color: #fff0b3;
                }

                .dish2 {
                    background-color: #d6f5d6;
                }
                
                .dish3 {
                    background-color: #d6ecff;
                }
                
                .dish4 {
                    background-color: #e6d6ff;
                }
                
                .dish5 {
                    background-color: #ffd9f0;
                }
                
                .dish6 {
                    background-color: #ffe4cc;
                }
                
                .dish7 {
                    background-color: #d9fff2;
                }
                
                .dish8 {
                    background-color: #f0f0f4;
                }
                
        </style>

</head>
<body>


    <!--<h4>キッチンコース管理</h4> --> 
    <div class="controls">
 <input type="time" id="courseTime">
            
 <select id="courseSelect">
            <option value="">コース選択</option>
        　　<option value="当日">当日コース</option>
            <option value="4000円">4000円コース</option>
            <option value="4500円">4500円コース</option>
            <option value="5000円">5000円コース</option>
            <option value="6000円">6000円コース</option>
            <option value="7000円">7000円コース</option>
 </select>

            
 <input type="number" id="people" placeholder="人数" style="width: 50px;" min = 1>
 <input type="text" id="tableNo" placeholder="テーブル">

 <button onclick="addCourse()">追加</button>

    </div>
        <table>
            <thead>
                <tr>
                    <th></th>
                    <th></th>
        　　        <th>時間</th>
                    <th>コース</th> 
                    <th>人数</th>
                    <th>テーブル</th>
                　　<th>L.O.</th>
                    <th>料理①</th>
                    <th>料理②</th>
                    <th>料理③</th>
                    <th>料理④</th>
                    <th>料理⑤</th>
                    <th>料理⑥</th>
                    <th>料理⑦</th>
                    <th>料理⑧</th>
                    <th>料理⑨</th>
                </tr>
            </thead>

        <tbody id="courseBody"></tbody>
        </table>

        <h3>完了コース</h3>

<table>
        <thead>
                <tr>
                　　<th>時間</th>
                    <th>コース</th>  
                    <th>人数</th>
                    <th>卓番</th>
                    <th>完了時間</th>
                　　<th>操作</th>
                </tr>
        </thead>

<tbody id="completedBody"></tbody>
        
</table>
        
        <script type="module" src="firebase.js"></script>
        <script  type="module" src="script.js"></script>

</body>
</html>
